# Render Blueprint 配置
# 在 Render 里选择 "New +" → "Blueprint"，指向这个仓库，
# Render 会自动读取此文件完成后端服务的基础配置。
# BAIDU_API_KEY / BAIDU_SECRET_KEY 需要你在 Render 的 Dashboard 里手动填入真实值
# （sync: false 表示这个值不会被提交到代码仓库，需要手动设置）。
services:
  - type: web
    name: tanci-ocr-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BAIDU_API_KEY
        sync: false
      - key: BAIDU_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
